[tox]
envlist = py{310,311,312,313}-{test,devdeps}-{both,qt,jupyter}-compression

[testenv]
passenv =
    DISPLAY
    HOME
changedir =
    test: .tmp/{envname}
extras =
    test: test
    both: qt
    both: jupyter
    qt: qt
    jupyter: jupyter
    compression: compression
commands =
    both: pip install pytest-qt
    qt: pip install pytest-qt
    test: pip freeze
    test: pytest --pyargs glue_ar --cov glue_ar {posargs}
deps =
    devdeps: git+https://github.com/glue-viz/glue
    devdeps: git+https://github.com/glue-viz/echo
    devdeps: git+https://github.com/glue-viz/glue-qt
    devdeps: git+https://github.com/glue-viz/glue-jupyter
    devdeps: git+https://github.com/glue-viz/glue-vispy-viewers
    devdeps: git@github.com:python-pillow/Pillow
    devdeps: git@github.com:pygfx/gltflib
    devdeps: git@github.com:wolph/numpy-stl

[testenv:codestyle]
skipsdist = true
skip_install = true
description = Run all style and file checks with pre-commit
deps =
    pre-commit
commands =
    pre-commit install-hooks
    pre-commit run --color always --all-files --show-diff-on-failure
